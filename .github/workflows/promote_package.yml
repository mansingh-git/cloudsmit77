name: Promote Python Package

on:
  repository_dispatch:
    types: [cloudsmith-webhook]

env:
  CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
  CLOUDSMITH_STAGING_REPO: 'staging'
  CLOUDSMITH_PRODUCTION_REPO: 'production'
  CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}

permissions:
  id-token: write
  contents: read

jobs:
  tag-and-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v1.0.1
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: ${{ env.CLOUDSMITH_SERVICE_SLUG }}

      - name: Extract package info from webhook payload
        id: package-info
        run: |
          # Extract package identifier from webhook payload
          # Support both direct Cloudsmith format and wrapped format
          PACKAGE_SLUG="${{ github.event.client_payload.data.slug_perm }}"
          PACKAGE_NAME="${{ github.event.client_payload.data.name }}"
          PACKAGE_VERSION="${{ github.event.client_payload.data.version }}"

          echo "Package Slug: $PACKAGE_SLUG"
          echo "Package Name: $PACKAGE_NAME"
          echo "Package Version: $PACKAGE_VERSION"

          echo "package_slug=$PACKAGE_SLUG" >> $GITHUB_OUTPUT
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Tag package with ready-for-production
        run: |
          PACKAGE_SLUG="${{ steps.package-info.outputs.package_slug }}"

          if [ -z "$PACKAGE_SLUG" ] || [ "$PACKAGE_SLUG" = "" ]; then
            echo "No package slug found in webhook payload"
            exit 1
          fi

          echo "Tagging package $PACKAGE_SLUG with 'ready-for-production'"

          # Tag the package with ready-for-production based on webhook output
          cloudsmith tags add \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }}/$PACKAGE_SLUG \
            ready-for-production
        shell: bash

      - name: Query and promote all packages tagged with ready-for-production
        run: |
          # PACKAGE_QUERY returns all packages tagged with ready-for-production
          PACKAGE_QUERY="tag:ready-for-production"
          echo "Searching for packages with query: $PACKAGE_QUERY"

          PACKAGE_DATA=$(cloudsmith list packages ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }} -q "$PACKAGE_QUERY" -F json)

          # Get all package identifiers
          IDENTIFIERS=$(echo "$PACKAGE_DATA" | jq -r '.data[].slug_perm // empty')

          if [ -z "$IDENTIFIERS" ]; then
            echo "No packages found with ready-for-production tag"
            exit 0
          fi

          echo "Found packages to promote:"
          echo "$IDENTIFIERS"

          # Promote each tagged package using cloudsmith mv command
          for IDENTIFIER in $IDENTIFIERS; do
            echo "Promoting package: $IDENTIFIER"
            cloudsmith mv --yes \
              ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }}/$IDENTIFIER \
              ${{ env.CLOUDSMITH_PRODUCTION_REPO }}
          done

          echo "All tagged packages have been promoted to production"
        shell: bash
