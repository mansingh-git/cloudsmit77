name: Promote Python Package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Package version to promote (e.g., 0.0.1) - leave empty to promote all tagged packages'
        required: false
        type: string

env:
  CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
  CLOUDSMITH_STAGING_REPO: 'staging'
  CLOUDSMITH_PRODUCTION_REPO: 'production'
  CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}
  PACKAGE_NAME: 'example-package'

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v1.0.1
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: ${{ env.CLOUDSMITH_SERVICE_SLUG }}

      - name: Tag and promote package
        run: |
          # Determine query based on input
          if [ -n "${{ github.event.inputs.package_version }}" ]; then
            # Query for specific version
            PACKAGE_QUERY="name:${{ env.PACKAGE_NAME }} AND version:${{ github.event.inputs.package_version }}"
            echo "Looking for specific package: $PACKAGE_QUERY"
          else
            # Query for packages tagged ready-for-production, or all packages if none tagged
            PACKAGE_QUERY="tag:ready-for-production"
            echo "Looking for packages with ready-for-production tag"
          fi

          # Get packages from staging
          PACKAGE_DATA=$(cloudsmith list packages ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }} -q "$PACKAGE_QUERY" -F json 2>/dev/null || echo '{"data":[]}')

          # Extract package slugs
          IDENTIFIERS=$(echo "$PACKAGE_DATA" | jq -r '.data[].slug_perm // empty')

          # If no tagged packages found and no specific version requested, get latest package
          if [ -z "$IDENTIFIERS" ] && [ -z "${{ github.event.inputs.package_version }}" ]; then
            echo "No tagged packages found, getting latest package..."
            PACKAGE_DATA=$(cloudsmith list packages ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }} -q "name:${{ env.PACKAGE_NAME }}" -F json 2>/dev/null || echo '{"data":[]}')
            IDENTIFIERS=$(echo "$PACKAGE_DATA" | jq -r '.data[0].slug_perm // empty')
          fi

          if [ -z "$IDENTIFIERS" ]; then
            echo "No packages found to promote"
            exit 1
          fi

          echo "Found packages to promote:"
          echo "$IDENTIFIERS"

          # Tag and promote each package
          for IDENTIFIER in $IDENTIFIERS; do
            echo "Processing package: $IDENTIFIER"

            # Tag with ready-for-production
            echo "Tagging package with ready-for-production..."
            cloudsmith tags add \
              ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }}/$IDENTIFIER \
              ready-for-production || true

            # Promote to production
            echo "Promoting package to production..."
            cloudsmith mv --yes \
              ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.CLOUDSMITH_STAGING_REPO }}/$IDENTIFIER \
              ${{ env.CLOUDSMITH_PRODUCTION_REPO }}
          done

          echo "All packages have been promoted to production"
        shell: bash
